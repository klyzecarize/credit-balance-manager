<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Credit Balance Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <header>
            <nav class="navbar navbar-dark bg-dark text-center">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">Credit Balance Checker</span>
                </div>
            </nav>
        </header>

        <main>
            <!-- Infos -->
            <section id="amount" class="row text-center">
                <section class="col-md-4">
                    <div class="card m-2">
                        <div class="card-body">
                            <h5 class="card-title">Remaining Balance</h5>
                            <p id="remainingBalTxt" class="card-text">₱532</p>
                        </div>
                    </div>
                </section>
                <section class="col-md-4">
                    <div class="card m-2">
                        <div class="card-body">
                            <h5 class="card-title">Credit Limit</h5>
                            <p id="creditLimitTxt" class="card-text">₱3000</p>
                        </div>
                    </div>
                </section>
                <section class="col-md-4">
                    <div class="card m-2">
                        <div class="card-body">
                            <h5 class="card-title">Billing Day</h5>
                            <p id="billingDayTxt" class="card-text">11th of the month</p>
                        </div>
                    </div>
                </section>
            </section>

            <hr>

            <!-- Button trigger modal -->
            <div class="container justify-content-middle">
                <button type="button" class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                    Add Expense
                </button>
            </div>

            <!-- Table Logs -->
            <section class="container">
                <table class="table text-center"  id="expenseTable">
                    <thead>
                        <tr>
                            <!-- <th scope="col">#</th>
                            <th scope="col">Description</th>
                            <th scope="col">Amount</th>
                            <th scope="col">Date</th> -->
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>

            <!-- Modals -->
            <!-- Add Expense Modal -->
            <div class="modal fade" id="addExpenseModal" tabindex="-1" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <form id="expenseForm">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="addExpenseModalLabel">Add Expense</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="descriptionValue" class="form-label">Description</label>
                                    <input type="text" class="form-control" name="description" id="descriptionValue" placeholder="Jollibee">
                                </div>
                                <div class="mb-3">
                                    <label for="amountValue" class="form-label">Amount</label>
                                    <input type="number" class="form-control" name="amount" id="amountValue" placeholder="₱100">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Save changes</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer></footer>
        
        <!-- Scripts -->
        <script type="module" src="script.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
